name: Build for Linux

on:
    push:
        tags:
            - "v*"

jobs:
    build-and-release:
        runs-on: ubuntu-latest

        permissions:
            contents: write

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Go
              uses: actions/setup-go@v5
              with:
                  go-version: "1.25"

            - name: Install dependencies
              run: go mod tidy

            - name: Build for Linux
              run: |
                  GOOS=linux GOARCH=amd64 go build -o voicepeak_api main.go

            - name: Create release
              uses: softprops/action-gh-release@v2
              with:
                files: voicepeak_api
                generate_release_notes: true
